services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-p", "1883", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 2s
      timeout: 5s
      retries: 15

  service:
    build: ./service
    ports:
      - "8000:8000"
    environment:
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      CORS_ORIGINS: http://localhost:8080,http://localhost:8081
    volumes:
      # Generated by scripts/setup-tls.sh (or .ps1) — gitignored, per-machine.
      - ./certs:/certs:ro
    depends_on:
      valkey:
        condition: service_healthy
      mqtt:
        condition: service_healthy
