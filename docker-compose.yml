services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  service:
    build: ./service
    ports:
      - "8000:8000"
    environment:
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      CORS_ORIGINS: http://localhost:8080,http://localhost:8081
    depends_on:
      valkey:
        condition: service_healthy
